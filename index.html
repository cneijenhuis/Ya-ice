<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ya-Ice</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="app">
  <header>
    <h1>Ya-Ice</h1>
    <button id="new-game" class="small-btn">New Game</button>
  </header>

  <div id="players-bar" class="players-bar hidden"></div>

  <div class="dice-area">
    <div class="dice-row" id="dice-row"></div>
    <div class="roll-info">
      <span id="rolls-left">Rolls left: 3</span>
    </div>
    <button id="roll-btn" class="primary-btn">Roll Dice</button>
    <label class="shake-toggle">
      <input type="checkbox" id="shake-toggle">
      Shake to roll dice
    </label>
  </div>

  <div class="scorecard">
    <table>
      <thead>
        <tr><th>Category</th><th>Score</th></tr>
      </thead>
      <tbody id="scorecard-body"></tbody>
      <tfoot>
        <tr class="total-row"><td>Total</td><td id="total-score">0</td></tr>
      </tfoot>
    </table>
  </div>

  <div id="message" class="message"></div>
  <div id="save-notice" class="save-notice hidden">
    Saved as <span id="save-category"></span> <button id="undo-btn" class="link-btn">Undo</button>
  </div>
</div>

<div id="setup-overlay" class="overlay hidden">
  <div class="overlay-card setup-card">
    <h2>New Game</h2>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="single">Single Player</button>
      <button class="mode-btn" data-mode="multi">Multiplayer</button>
    </div>
    <div id="player-setup" class="player-setup hidden">
      <div id="player-list"></div>
      <button id="add-player" class="small-btn">+ Add Player</button>
    </div>
    <button id="start-game-btn" class="primary-btn">Start Game</button>
  </div>
</div>

<div id="handoff-overlay" class="overlay hidden">
  <div class="overlay-card">
    <h2>Hand to <span id="handoff-name"></span></h2>
    <button id="handoff-ok" class="primary-btn">OK</button>
  </div>
</div>

<div id="game-over" class="overlay hidden">
  <div class="overlay-card">
    <h2>Game Over!</h2>
    <div id="final-scores"></div>
    <button id="restart-btn" class="primary-btn">New Game</button>
  </div>
</div>

<script src="game.js?v=4"></script>
</body>
</html>
